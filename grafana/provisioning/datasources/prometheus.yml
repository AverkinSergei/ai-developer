# Автонастройка источника данных Grafana (provisioning).
# uid фиксирован (prometheus) — на него ссылается дашборд ai-developer.json.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false
